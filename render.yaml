databases:
  - name: leadfinder-db
    databaseName: leadfinder
    plan: free
    postgresMajorVersion: "16"

services:
  # Backend
  - type: web
    name: leadfinder-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/health
    # NOTA: el seed y el parser NO van acá a propósito. Corrían en cada deploy
    # y, tras un demo-data (que reescribe los CUITs), el parser dejaba de matchear
    # por cuit y re-insertaba todo, duplicando empresas/leads. La carga inicial
    # (seed -> parser -> demo-data) es un procedimiento manual de una sola vez.
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @leadfinder/shared build &&
      pnpm --filter backend exec prisma generate &&
      pnpm --filter backend exec prisma migrate deploy
    startCommand: pnpm --filter backend start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leadfinder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      # URL del frontend (para CORS). Ajustar si Render le agrega sufijo al host.
      - key: FRONTEND_URL
        value: https://leadfinder-web.onrender.com

  # Frontend
  - type: web
    name: leadfinder-web
    runtime: static
    branch: main
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @leadfinder/shared build &&
      pnpm --filter frontend build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Ajustar si Render le agrega sufijo al host de leadfinder-api.
      - key: VITE_API_URL
        value: https://leadfinder-api-jyy8.onrender.com
